<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SJRC</title>

    <link rel="icon" type="image/png" href="favicon.png?v=7">
    <link rel="shortcut icon" href="favicon.png?v=7">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .admin-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logout-btn {
            background-color: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
    </style>
</head>

<body>
    <div id="loading">Loading...</div>

    <div id="admin-content" style="display: none;">
        <nav class="navbar">
            <div class="logo">SJRC Admin</div>
            <div class="nav-links">
                <a href="index_ja.html">View Site</a>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </div>
        </nav>

        <div class="container admin-container">
            <div class="admin-header">
                <h1>Welcome, Masa</h1>
                <p>Authorized access confirmed</p>
            </div>

            <div class="dashboard-grid">
                <div class="dashboard-card">
                    <h3>Manage Members</h3>
                    <p>Add, edit, or remove community members.</p>
                    <button class="btn btn-primary" style="margin-top: 10px;">Go to Members</button>
                </div>
                <div class="dashboard-card">
                    <h3>Event Reports</h3>
                    <p>Create and publish new event reports.</p>
                    <button class="btn btn-primary" style="margin-top: 10px;">Manage Reports</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth } from './firebase-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const loadingOverlay = document.getElementById('loading');
        const adminContent = document.getElementById('admin-content');
        const logoutBtn = document.getElementById('logout-btn');

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === 'masa.nakashima@maripiyo.com') {
                // User is signed in and authorized
                loadingOverlay.style.display = 'none';
                adminContent.style.display = 'block';
            } else {
                // No user is signed in or unauthorized
                if (user) {
                    console.warn('Unauthorized user tried to access admin:', user.email);
                    signOut(auth);
                }
                window.location.href = 'login.html';
            }
        });

        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = 'login.html';
            });
        });
    </script>
</body>

</html>
