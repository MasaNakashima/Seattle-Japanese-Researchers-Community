<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>研究者名鑑 - シアトル日本人研究者の会</title>

    <link rel="icon" type="image/png" href="favicon.png?v=7">
    <link rel="shortcut icon" href="favicon.png?v=7">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css?v=1.1" />
</head>

<body>
    <div id="app">
        <header class="header">
            <div class="container">
                <a href="index_ja.html" class="logo" aria-label="SJRC Home"><img src="logo-main.png?v=5" alt="SJRC logo" class="logo-icon"></a>
                <button class="nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation menu"><span></span><span></span><span></span></button>
                <nav class="nav">
                    <a href="index_ja.html#about">概要</a>
                    <a href="index_ja.html#activities">活動内容</a>
                    <a href="reports_ja.html">活動報告</a>
                    <a href="members_ja.html" class="active">メンバー</a>
                    <a href="knowledge_ja.html">ナレッジ</a>
                    <div class="lang-switch">
                        <a href="members.html" class="lang-link">EN</a> | <span class="lang-active">JA</span>
                    </div>
                    <a href="https://www.facebook.com/groups/3358285694229446/" target="_blank"
                        class="btn btn-primary">コミュニティに参加</a>
                </nav>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="container">
                    <h1>研究者名鑑</h1>
                    <p>シアトル近郊の多様な分野で活躍する <span id="member-count-display">303</span> 名の研究者たち</p>
                </div>
            </div>

            <section class="section">
                <div class="container">
                    <!-- Search/Filter Placeholder -->
                    <div class="filter-bar">
                        <input type="text" id="member-search" placeholder="研究者、トピック、ラボ名で検索..." class="search-input">

                        <div class="sort-container">
                            <label for="member-sort">並び替え:</label>
                            <select id="member-sort" class="sort-select">
                                <option value="name-asc">名前 (A-Z)</option>
                                <option value="name-desc">名前 (Z-A)</option>
                                <option value="lab-asc">所属機関 (A-Z)</option>
                            </select>
                        </div>
                    </div>

                    <div id="active-tag-container" class="active-tag-container" style="display: none;">
                        <span class="active-tag-label">フィルター中:</span>
                        <div id="active-tag-list" class="active-tag-list"></div>
                        <button id="clear-tag-filter" class="clear-filter-btn">すべてクリア</button>
                    </div>

                    <div class="cloud-section">
                        <h3 class="cloud-title">研究分野</h3>
                        <div id="tag-cloud" class="tag-cloud">
                            <!-- Unique tags will be injected here by main.js -->
                        </div>
                    </div>

                    <div class="cloud-section">
                        <h3 class="cloud-title">役職・職能</h3>
                        <div id="title-cloud" class="tag-cloud">
                            <!-- Unique titles will be injected here by main.js -->
                        </div>
                    </div>

                    <div id="members-grid" class="members-grid">
                        <!-- Members will be injected here by main.js -->
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2024 Seattle Japanese Researchers' Community (シアトル日本人研究者の会).</p>
            </div>
        </footer>
    </div>

    <!-- Email Modal -->
    <div id="email-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body-content">
                <!-- Content injected by main.js -->
            </div>
        </div>
    </div>

    <script type="module" src="main.js?v=1.2"></script>
</body>

</html>
