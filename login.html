<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Login - SJRC</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            text-align: center;
        }

        .login-btn {
            background-color: #4285F4;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #357ae8;
        }

        .error-message {
            color: #ff4444;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">SJRC</div>
        <div class="nav-links">
            <a href="index_ja.html">ホーム</a>
        </div>
    </nav>

    <div class="container login-container">
        <h1>Editor Login</h1>
        <p>Please sign in with your authorized Google account.</p>

        <button id="google-login-btn" class="login-btn">
            <svg width="18" height="18" viewBox="0 0 18 18">
                <path
                    d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"
                    fill="#fff" />
                <path
                    d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.715H.957v2.332A8.997 8.997 0 0 0 9 18z"
                    fill="#fff" />
                <path
                    d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.448 2.3 w43.957 3.792l3.007-2.332z"
                    fill="#fff" />
                <path
                    d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.272C4.672 5.141 6.656 3.58 9 3.58z"
                    fill="#fff" />
            </svg>
            Sign in with Google
        </button>
        <p id="error-message" class="error-message"></p>
    </div>

    <script type="module">
        import { auth, provider } from './firebase-config.js';
        import { signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const loginBtn = document.getElementById('google-login-btn');
        const errorMsg = document.getElementById('error-message');

        loginBtn.addEventListener('click', async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // Check authorization
                if (user.email === 'masa.nakashima@maripiyo.com') {
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.textContent = 'Unauthorized access. Please use an authorized account.';
                    errorMsg.style.display = 'block';
                    await auth.signOut();
                }
            } catch (error) {
                console.error(error);
                errorMsg.textContent = 'Login failed: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
