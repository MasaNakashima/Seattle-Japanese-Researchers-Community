<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" href="favicon.png?v=7">
    <link rel="shortcut icon" href="favicon.png?v=7">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div id="app">
        <header class="header">
            <div class="container">
                <a href="index_ja.html" class="logo" aria-label="SJRC Home"><img src="logo-main.png?v=5" alt="SJRC logo"
                        class="logo-icon"></a>
                <button class="nav-toggle" type="button" aria-expanded="false"
                    aria-label="Toggle navigation menu"><span></span><span></span><span></span></button>
                <nav class="nav">
                    <a href="index_ja.html#about">概要</a>
                    <a href="index_ja.html#activities">活動内容</a>
                    <a href="reports_ja.html">活動報告</a>
                    <a href="members_ja.html">メンバー</a>
                    <a href="knowledge_ja.html" class="active">ナレッジ</a>
                    <div class="lang-switch">
                        <a href="knowledge.html" class="lang-link">EN</a> | <span class="lang-active">JA</span>
                    </div>
                    <a href="https://www.facebook.com/groups/3358285694229446/" target="_blank"
                        class="btn btn-primary">コミュニティに参加</a>
                </nav>
            </div>
        </header>

        <main>
            <div class="page-header">
                <div class="container">
                    <h1>ナレッジ共有</h1>
                    <p>コミュニティメンバーによる知見、リソース、ノウハウの共有。</p>
                </div>
            </div>

            <section class="section chat-section">
                <div class="container chat-layout">
                    <div class="chat-container">
                        <div class="chat-header">
                            <h2>アシスタント</h2>
                            <p class="status">オンライン</p>
                        </div>
                        <div class="chat-messages" id="chat-messages">
                            <div class="chat-message bot-message">
                                <div class="chat-avatar">🤖</div>
                                <div class="chat-content">
                                    こんにちは！SJRC Knowledge
                                    Assistantです。特定のメンバーやトピックを検索したり、<strong>異なる分野を組み合わせて</strong>（例：「Tsunami &
                                    Cardiology」）当コミュニティの異分野融合アイデアを探索することができます。どのような情報をお探しですか？
                                </div>
                            </div>
                        </div>
                        <div class="chat-input-wrapper">
                            <input type="text" id="chat-input" class="chat-input"
                                placeholder="研究トピック、メンバー、ラボについて質問する..." autocomplete="off">
                            <button class="chat-send-btn btn btn-primary" id="chat-send-btn" aria-label="送信">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2024 Seattle Japanese Researchers' Community (シアトル日本人研究者の会).</p>
            </div>
        </footer>
    </div>
    <script type="module" src="main.js?v=1.2"></script>
    <script src="knowledge.js?v=1.0"></script>
</body>

</html>
